<section class="hero-card">
  <!-- Background grid -->
  <div class="hero-grid"></div>

  <div class="hero-content">
    <div class="hero-text">
      <div class="industry-badge">
        <lucide-icon [img]="ShieldIcon" [size]="14"></lucide-icon>
        <span>Indústria 4.0</span>
      </div>

      <h1 class="hero-title">
        Yansu: Inspeção Óptica <span class="highlight">Inteligente</span>
      </h1>

      <p class="hero-description">
        Detecção de <span class="emphasis">anomalias</span> em PCBs utilizando Aprendizado Não
        Supervisionado.
      </p>
    </div>

    <!-- AOI Scanner icon -->
    <div class="scan-container">
      <div class="scan-box">
        <div class="scan-glow"></div>
        <lucide-icon [img]="ScanIcon" [size]="56"></lucide-icon>
        <div class="scan-line"></div>
      </div>
      <span class="aoi-label">AOI System</span>
    </div>
  </div>
</section>
